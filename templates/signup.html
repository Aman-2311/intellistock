<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Initialize Account | IntelliStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon" style="margin: 0 auto 15px;">🛰️</div>
      <h1 class="auth-title">Intelli<span>Stock</span></h1>
      <p class="auth-sub">Initialize your terminal operator credentials</p>
    </div>

    <form method="POST">
      {% if error %}
      <div style="background: rgba(255,45,85,0.1); color: var(--strong-sell); padding: 10px; border-radius: 4px; font-size: 12px; margin-bottom: 20px; border: 1px solid var(--strong-sell); text-align: center; font-family: 'Space Mono', monospace;">
        {{ error }}
      </div>
      {% endif %}
      <div class="form-group">
        <label class="form-label">REQUEST OPERATOR ID</label>
        <input class="auth-input" type="text" name="username" placeholder="e.g. AMAN_2311" required />
      </div>
      <div class="form-group">
        <label class="form-label">SET ACCESS CODE</label>
        <input class="auth-input" type="password" name="password" placeholder="••••••••" required />
      </div>
      <div class="form-group">
        <label class="form-label">CONFIRM ACCESS CODE</label>
        <input class="auth-input" type="password" name="confirm_password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-auth">INITIALIZE TERMINAL →</button>
    </form>
    
    <div style="margin-top: 20px; text-align: center;">
      <p style="font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);">Already verified? <a href="/login" style="color: var(--accent); text-decoration: none;">ACCESS TERMINAL</a></p>
    </div>

    <div style="margin-top: 25px; text-align: center; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); opacity: 0.6;">
       SYSTEM INITIALIZATION v1.0.4 <br/>
       SECURITY REGISTRY: ACTIVE
    </div>
  </div>
</div>

</body>
</html>
